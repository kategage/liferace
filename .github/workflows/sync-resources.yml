name: Sync Clinical Resources from Google Drive

on:
  schedule:
    # Run every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: # Manual trigger from Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run sync script
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: |
          python clinical-resources/sync/sync_drive.py \
            --folder-id "$DRIVE_FOLDER_ID" \
            --api-key "$GOOGLE_API_KEY" \
            --output clinical-resources/data/resources.json

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add clinical-resources/data/resources.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync clinical resources from Google Drive"
            git push
          fi
